name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        We'd love to hear your ideas! Please describe the feature you'd like to see.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: Is this feature request related to a problem? Describe it clearly.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: Describe your ideal solution...
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: List alternative approaches...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical — Blocker for adoption or core workflow
        - High — Significant improvement to user experience
        - Medium — Nice to have, improves existing workflow
        - Low — Minor enhancement, cosmetic
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any mockups, screenshots, references, or additional context.
      placeholder: Add context, links, or images here...
    validations:
      required: false
